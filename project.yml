name: JustZen
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  FocusTimer:
    type: application
    platform: iOS
    sources:
      - path: FocusTimer
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: FocusTimer/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.JustZen
        CODE_SIGN_ENTITLEMENTS: FocusTimer/FocusTimer.entitlements
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    dependencies:
      - target: FocusTimerWidget
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: plugins

  FocusTimerWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: FocusTimerWidget
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: FocusTimerWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.JustZen.widget
        CODE_SIGN_ENTITLEMENTS: FocusTimerWidget/FocusTimerWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: true
        SWIFT_EMIT_LOC_STRINGS: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        TARGETED_DEVICE_FAMILY: "1,2"
