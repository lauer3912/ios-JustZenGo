name: JustZenGo
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  JustZenGo:
    type: application
    platform: iOS
    sources:
      - path: JustZenGo
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: JustZenGo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.JustZen
        CODE_SIGN_ENTITLEMENTS: JustZenGo/JustZenGo.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: true
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    # Widget removed for App Store submission (App Groups profile not available)

  JustZenGoWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: JustZenGoWidget
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
    settings:
      base:
        INFOPLIST_FILE: JustZenGoWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.JustZen.widget
        CODE_SIGN_ENTITLEMENTS: JustZenGoWidget/JustZenGoWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B
        SKIP_INSTALL: true
        SWIFT_EMIT_LOC_STRINGS: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        TARGETED_DEVICE_FAMILY: "1,2"

  JustZenGoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: JustZenGoUITests
    dependencies:
      - target: JustZenGo
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.JustZen.UITests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"


